{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StyleNest</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/custom.css' %}">

    <style>
        :root {
            --bg: #f6f7fb;
            --surface: rgba(255,255,255,0.92);
            --surface-strong: #ffffff;
            --text: #111827;
            --muted: #6b7280;
            --dark: #0f172a;
            --dark-2: #111827;
            --line: rgba(255,255,255,0.12);
            --shadow-sm: 0 10px 25px rgba(15, 23, 42, 0.08);
            --shadow-md: 0 18px 45px rgba(15, 23, 42, 0.14);
            --gold: #d4af37;
            --gold-soft: rgba(212,175,55,0.18);
            --radius-sm: 14px;
            --radius-md: 22px;
            --radius-lg: 32px;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background:
                radial-gradient(circle at top left, rgba(212,175,55,0.08), transparent 24%),
                radial-gradient(circle at top right, rgba(17,24,39,0.05), transparent 20%),
                var(--bg);
            color: var(--text);
            font-family: Arial, Helvetica, sans-serif;
        }

        .site-shell {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        main {
            flex: 1;
        }

        /* Navbar */
        .site-navbar {
            background: rgba(15, 23, 42, 0.82);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--line);
            box-shadow: 0 10px 35px rgba(0,0,0,0.14);
        }

        .navbar-brand {
            font-size: 1.6rem;
            letter-spacing: 0.04em;
            position: relative;
        }

        .navbar-brand::after {
            content: "";
            display: block;
            width: 36px;
            height: 2px;
            margin-top: 5px;
            background: linear-gradient(90deg, var(--gold), transparent);
        }

        .site-navbar .nav-link {
            color: rgba(255,255,255,0.82) !important;
            font-weight: 500;
            position: relative;
            margin-right: 10px;
            transition: color 0.25s ease;
        }

        .site-navbar .nav-link:hover,
        .site-navbar .nav-link:focus {
            color: #fff !important;
        }

        .site-navbar .nav-link::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -4px;
            width: 0;
            height: 2px;
            background: var(--gold);
            transition: width 0.25s ease;
        }

        .site-navbar .nav-link:hover::after,
        .site-navbar .nav-link:focus::after {
            width: 100%;
        }

        .nav-action-btn {
            border-radius: 999px;
            font-weight: 600;
            padding: 0.45rem 1rem;
        }

        /* Hero helpers */
        .hero-section {
            min-height: 600px;
            display: flex;
            align-items: center;
            position: relative;
            overflow: hidden;
            background:
                linear-gradient(rgba(8,12,20,0.50), rgba(8,12,20,0.50)),
                url('{% static "images/fashion-bg.jpg" %}') center/cover no-repeat;
        }

        .hero-section::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(140deg, rgba(212,175,55,0.12), transparent 30%),
                linear-gradient(320deg, rgba(255,255,255,0.06), transparent 24%);
            pointer-events: none;
        }

        .glass-panel {
            background: rgba(255,255,255,0.10);
            border: 1px solid rgba(255,255,255,0.16);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: var(--shadow-md);
            border-radius: var(--radius-lg);
        }

        /* Shared cards */
        .feature-card,
        .category-card,
        .product-card {
            background: var(--surface);
            border: 1px solid rgba(17,24,39,0.06);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            transition: transform 0.28s ease, box-shadow 0.28s ease, border-color 0.28s ease;
        }

        .feature-card:hover,
        .category-card:hover,
        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-md);
            border-color: rgba(212,175,55,0.28);
        }

        .feature-card,
        .category-card {
            padding: 2rem 1.25rem;
        }

        .product-card {
            overflow: hidden;
            height: 100%;
            background: var(--surface-strong);
        }

        .product-card img {
            width: 100%;
            height: 290px;
            object-fit: cover;
            transition: transform 0.45s ease;
        }

        .product-card:hover img {
            transform: scale(1.04);
        }

        .product-info {
            padding: 1.25rem;
        }

        /* Section helpers */
        .section-heading {
            display: flex;
            align-items: end;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1.75rem;
            flex-wrap: wrap;
        }

        .section-heading h2 {
            margin-bottom: 0;
            font-weight: 700;
            letter-spacing: -0.03em;
        }

        .section-kicker {
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 0.16em;
            color: var(--gold);
            margin-bottom: 0.45rem;
            font-weight: 700;
        }

        /* Footer */
        .site-footer {
            margin-top: 72px;
            background:
                linear-gradient(180deg, #111827, #0b1220);
            color: rgba(255,255,255,0.9);
            padding: 32px 0 22px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }

        .footer-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.4rem;
        }

        .footer-subtitle {
            color: rgba(255,255,255,0.65);
            margin-bottom: 0;
            font-size: 0.95rem;
        }

        .footer-bottom {
            border-top: 1px solid rgba(255,255,255,0.08);
            margin-top: 18px;
            padding-top: 18px;
            font-size: 0.92rem;
            color: rgba(255,255,255,0.72);
        }

        /* Utility polish */
        .btn-dark {
            background: var(--dark-2);
            border-color: var(--dark-2);
            border-radius: 14px;
            font-weight: 600;
        }

        .btn-dark:hover {
            background: #0b1220;
            border-color: #0b1220;
        }

        .btn-outline-dark {
            border-radius: 14px;
            font-weight: 600;
        }

        .btn-outline-dark:hover {
            background: var(--dark-2);
            color: #fff;
        }

        @media (max-width: 991.98px) {
            .hero-section {
                min-height: 520px;
            }

            .site-navbar .nav-link::after {
                display: none;
            }
        }

        @media (max-width: 767.98px) {
            .navbar-brand {
                font-size: 1.4rem;
            }

            .hero-section {
                min-height: 460px;
            }

            .product-card img {
                height: 240px;
            }

            .feature-card,
            .category-card {
                padding: 1.5rem 1rem;
            }
        }

        @media (max-width: 575.98px) {
            .hero-section {
                min-height: 420px;
            }

            .product-card img {
                height: 220px;
            }

            .nav-action-btn {
                padding: 0.4rem 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="site-shell">

        <nav class="navbar navbar-expand-lg navbar-dark site-navbar py-3 sticky-top">
            <div class="container">
                <a class="navbar-brand fw-bold" href="{% url 'home' %}">StyleNest</a>

                <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="mainNavbar">
                    <ul class="navbar-nav me-auto ms-lg-4 mt-3 mt-lg-0">
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'home' %}">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'store' %}">Store</a>
                        </li>
                    </ul>

                    <div class="d-flex gap-2 mt-3 mt-lg-0">
                        <a href="{% url 'cart' %}" class="btn btn-outline-light btn-sm nav-action-btn">
                            Cart ({{ cart_count }})
                        </a>
                        <a href="/admin/" class="btn btn-light btn-sm nav-action-btn">
                            Admin
                        </a>
                    </div>
                </div>
            </div>
        </nav>

        <main>
            {% block content %}
            {% endblock %}
        </main>

        <footer class="site-footer">
            <div class="container">
                <div class="row align-items-center gy-3">
                    <div class="col-md-6">
                        <div class="footer-title">StyleNest</div>
                        <p class="footer-subtitle">Modern fashion, curated collections, and a cleaner shopping experience.</p>
                    </div>
                    <div class="col-md-6 text-md-end">
                        <div class="d-flex justify-content-md-end gap-2 flex-wrap">
                            <a href="{% url 'home' %}" class="btn btn-outline-light btn-sm nav-action-btn">Home</a>
                            <a href="{% url 'store' %}" class="btn btn-outline-light btn-sm nav-action-btn">Store</a>
                            <a href="{% url 'cart' %}" class="btn btn-outline-light btn-sm nav-action-btn">Cart</a>
                        </div>
                    </div>
                </div>

                <div class="footer-bottom text-center">
                    &copy; 2026 StyleNest. All rights reserved.
                </div>
            </div>
        </footer>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
