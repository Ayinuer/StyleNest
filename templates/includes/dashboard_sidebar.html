<aside class="col-md-3 mb-4">
    <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body p-3">

            <!-- Title -->
            <h5 class="fw-bold mb-3 px-2">My Account</h5>

            <!-- Menu -->
            <div class="list-group list-group-flush">

                <a href="{% url 'dashboard' %}"
                   class="list-group-item list-group-item-action rounded-3 mb-1 
                   {% if request.path == '/accounts/' %}active bg-dark text-white border-0{% endif %}">
                    Dashboard
                </a>

                <a href="{% url 'my_orders' %}"
                   class="list-group-item list-group-item-action rounded-3 mb-1 
                   {% if '/my_orders/' in request.path %}active bg-dark text-white border-0{% endif %}">
                    My Orders
                </a>

                <a href="{% url 'edit_profile' %}"
                   class="list-group-item list-group-item-action rounded-3 mb-1 
                   {% if '/edit_profile/' in request.path %}active bg-dark text-white border-0{% endif %}">
                    Edit Profile
                </a>

                <a href="{% url 'change_password' %}"
                   class="list-group-item list-group-item-action rounded-3 mb-1 
                   {% if '/change_password/' in request.path %}active bg-dark text-white border-0{% endif %}">
                    Change Password
                </a>

            </div>

            <!-- Divider -->
            <hr class="my-3">

            <!-- Logout -->
            <div class="d-grid">
                <a href="{% url 'logout' %}" 
                   class="btn btn-outline-dark rounded-3">
                    <i class="fa fa-sign-out-alt me-2"></i> Log out
                </a>
            </div>

        </div>
    </div>
</aside>
