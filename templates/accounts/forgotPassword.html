{% extends 'base.html' %}

{% block content %}

<section class="section-content py-5" style="min-height: 84vh; background-color: #f8f9fa;">
    <div class="container">
        <div class="card border-0 shadow-sm rounded-4 mx-auto" style="max-width: 520px; margin-top: 80px;">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h2 class="fw-bold mb-2">Forgot Password?</h2>
                    <p class="text-muted mb-0">
                        Enter your email address and we’ll send you instructions to reset your StyleNest password.
                    </p>
                </div>

                {% include 'includes/alerts.html' %}

                <form action="{% url 'forgotPassword' %}" method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="email" class="form-label fw-semibold">Email Address</label>
                        <input 
                            type="email" 
                            class="form-control form-control-lg rounded-3" 
                            placeholder="Enter your email address" 
                            name="email"
                            id="email"
                            required
                        >
                    </div>

                    <div class="d-flex justify-content-end mb-4">
                        <a href="{% url 'login' %}" class="text-decoration-none">
                            Remember your password? Login
                        </a>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-dark btn-lg rounded-3">
                            Send Reset Link
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <p class="text-center mt-4 text-muted">
            Don’t have an account?
            <a href="{% url 'register' %}" class="text-decoration-none fw-semibold">Sign up</a>
        </p>
    </div>
</section>

{% endblock %}
