{% extends 'base.html' %}
{% load static %}

{% block content %}

<section class="py-5" style="min-height: 85vh; display: flex; align-items: center;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-9 col-lg-6">

                <div class="feature-card">
                    <div class="text-center mb-4">
                        <p class="section-kicker mb-2">Join StyleNest</p>
                        <h2 class="fw-bold mb-2">Create Your Account</h2>
                        <p class="text-muted mb-0">
                            Sign up to manage your orders, save your details, and shop with ease.
                        </p>
                    </div>

                    {% include 'includes/alerts.html' %}

                    <form method="POST" action="{% url 'register' %}">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Username</label>
                            <input type="text" name="username" class="form-control form-control-lg" placeholder="Choose a username" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Email Address</label>
                            <input type="email" name="email" class="form-control form-control-lg" placeholder="Enter your email address" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Password</label>
                            <input type="password" name="password" class="form-control form-control-lg" placeholder="Create a password" required>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-dark btn-lg">
                                Create Account
                            </button>
                        </div>
                    </form>

                    <p class="text-center mt-4 text-muted mb-0">
                        Already have an account?
                        <a href="{% url 'login' %}" class="fw-semibold text-decoration-none">Login</a>
                    </p>
                </div>

            </div>
        </div>
    </div>
</section>

{% endblock %}
