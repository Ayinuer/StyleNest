{% extends 'base.html' %}
{% load static %}

{% block content %}

<section class="py-5" style="min-height: 85vh; display: flex; align-items: center;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-5">

                <div class="feature-card">

                    <div class="text-center mb-4">
                        <p class="section-kicker mb-2">Security</p>
                        <h2 class="fw-bold mb-2">Reset Password</h2>
                        <p class="text-muted mb-0">
                            Create a new secure password for your StyleNest account.
                        </p>
                    </div>

                    {% include 'includes/alerts.html' %}

                    <form action="{% url 'resetPassword' %}" method="POST">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label for="password" class="form-label fw-semibold">New Password</label>
                            <input 
                                type="password" 
                                class="form-control form-control-lg"
                                placeholder="Create a strong password" 
                                name="password"
                                id="password"
                                required
                            >
                        </div>

                        <div class="mb-4">
                            <label for="confirm_password" class="form-label fw-semibold">Confirm Password</label>
                            <input 
                                type="password" 
                                class="form-control form-control-lg"
                                placeholder="Repeat your new password" 
                                name="confirm_password"
                                id="confirm_password"
                                required
                            >
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-dark btn-lg">
                                Reset Password
                            </button>
                        </div>
                    </form>

                    <p class="text-center mt-4 text-muted mb-0">
                        Remember your password?
                        <a href="{% url 'login' %}" class="fw-semibold text-decoration-none">Login</a>
                    </p>

                </div>

            </div>
        </div>
    </div>
</section>

{% endblock %}
