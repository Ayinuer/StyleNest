{% extends 'base.html' %}

{% block content %}

<section class="section-content py-5" style="min-height: 84vh; background-color: #f8f9fa;">
    <div class="container">
        <div class="card border-0 shadow-sm rounded-4 mx-auto" style="max-width: 500px; margin-top: 80px;">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h2 class="fw-bold mb-2">Reset Password</h2>
                    <p class="text-muted mb-0">
                        Create a new password for your StyleNest account.
                    </p>
                </div>

                {% include 'includes/alerts.html' %}

                <form action="{% url 'resetPassword' %}" method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="password" class="form-label fw-semibold">New Password</label>
                        <input 
                            type="password" 
                            class="form-control form-control-lg rounded-3" 
                            placeholder="Create a new password" 
                            name="password"
                            id="password"
                            required
                        >
                    </div>

                    <div class="mb-4">
                        <label for="confirm_password" class="form-label fw-semibold">Confirm Password</label>
                        <input 
                            type="password" 
                            class="form-control form-control-lg rounded-3" 
                            placeholder="Confirm your new password" 
                            name="confirm_password"
                            id="confirm_password"
                            required
                        >
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-dark btn-lg rounded-3">
                            Reset Password
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <p class="text-center mt-4 text-muted">
            Don’t have an account?
            <a href="{% url 'register' %}" class="text-decoration-none fw-semibold">Sign up</a>
        </p>
    </div>
</section>

{% endblock %}
