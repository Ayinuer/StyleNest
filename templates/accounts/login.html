{% extends 'base.html' %}
{% load static %}

{% block content %}

<section class="py-5" style="min-height: 85vh; display: flex; align-items: center;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-5">

                <div class="feature-card">

                    <div class="text-center mb-4">
                        <p class="section-kicker mb-2">Welcome Back</p>
                        <h2 class="fw-bold mb-2">Login to StyleNest</h2>
                        <p class="text-muted mb-0">
                            Access your account, orders, and saved details.
                        </p>
                    </div>

                    {% include 'includes/alerts.html' %}

                    <form method="POST" action="{% url 'login' %}">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Email</label>
                            <input type="email" name="email" class="form-control form-control-lg" placeholder="Enter your email">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Password</label>
                            <input type="password" name="password" class="form-control form-control-lg" placeholder="Enter your password">
                        </div>

                        <div class="d-flex justify-content-between mb-4">
                            <a href="{% url 'forgotPassword' %}" class="text-decoration-none">
                                Forgot password?
                            </a>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-dark btn-lg">
                                Login
                            </button>
                        </div>
                    </form>

                    <p class="text-center mt-4 text-muted">
                        Don’t have an account?
                        <a href="{% url 'register' %}" class="fw-semibold text-decoration-none">Sign up</a>
                    </p>

                </div>

            </div>
        </div>
    </div>
</section>

{% endblock %}
