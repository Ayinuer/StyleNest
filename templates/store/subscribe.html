{% extends 'base.html' %}

{% block content %}

<section class="py-5" style="min-height: 85vh; background-color: #f8f9fa;">
    <div class="container">

        <div class="row justify-content-center">
            <div class="col-lg-6">

                <div class="feature-card p-4 p-md-5">

                    <div class="text-center mb-4">
                        <p class="section-kicker mb-2">Stay Updated</p>
                        <h2 class="fw-bold mb-2">Subscribe to Fashion Updates</h2>
                        <p class="text-muted mb-0">
                            Get exclusive offers, new arrivals, and fashion trends directly to you.
                        </p>
                    </div>

                    <form method="POST">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Phone Number</label>
                            <input 
                                type="text" 
                                name="phone_number" 
                                class="form-control form-control-lg" 
                                placeholder="Enter your phone number"
                                required
                            >
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Birth Month</label>
                            <input 
                                type="text" 
                                name="birth_month" 
                                class="form-control form-control-lg" 
                                placeholder="e.g. January"
                                required
                            >
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-dark btn-lg">
                                Subscribe Now
                            </button>
                        </div>
                    </form>

                    <p class="text-muted small text-center mt-4 mb-0">
                        We respect your privacy. No spam, unsubscribe anytime.
                    </p>

                </div>

            </div>
        </div>

    </div>
</section>

{% endblock %}
