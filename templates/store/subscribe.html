<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscribe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container py-5">
        <div class="col-md-6 mx-auto">
            <h1 class="mb-4 text-center">Subscribe to Fashion Updates</h1>
            <div class="card shadow-sm p-4">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Phone Number</label>
                        <input type="text" name="phone_number" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Birth Month</label>
                        <input type="text" name="birth_month" class="form-control" placeholder="e.g. January" required>
                    </div>
                    <button type="submit" class="btn btn-dark w-100">Subscribe</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
