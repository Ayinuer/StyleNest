{% extends 'base.html' %}

{% block content %}

<section class="py-5" style="min-height: 85vh; background-color: #f8f9fa;">
    <div class="container">

        <div class="row justify-content-center">
            <div class="col-lg-6">

                <div class="feature-card text-center py-5 px-4">

                    <div class="mb-4">
                        <div style="
                            width: 70px;
                            height: 70px;
                            margin: 0 auto;
                            border-radius: 50%;
                            background: rgba(34,197,94,0.1);
                            display: flex;
                            align-items: center;
                            justify-content: center;
                        ">
                            <span style="font-size: 28px;">✓</span>
                        </div>
                    </div>

                    <p class="section-kicker mb-2">Success</p>

                    <h2 class="fw-bold mb-3">
                        Subscription Successful
                    </h2>

                    <p class="text-muted mb-4">
                        Thank you for subscribing to StyleNest. You’ll now receive updates on new arrivals, exclusive offers, and fashion trends.
                    </p>

                    <div class="d-grid gap-2">
                        <a href="{% url 'home' %}" class="btn btn-dark btn-lg">
                            Back to Home
                        </a>
                        <a href="{% url 'store' %}" class="btn btn-outline-dark">
                            Explore Store
                        </a>
                    </div>

                </div>

            </div>
        </div>

    </div>
</section>

{% endblock %}
